name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flask numpy Pillow
      - run: python -m unittest tests.test_resolve_api tests.test_identity_registry tests.test_identity_recognition tests.test_identity_routes -v
